<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GeoBotanix — UMA-OR Rare Plants 2026</title>
<style>
:root{
  --sand:#f5f0e4;--sand2:#ece6d3;--ink:#1a160e;--ink2:#4a3f2e;
  --stone:#7a7060;--rust:#8b3a1a;--sage:#4a7030;--sky:#1a5070;
  --gold:#9a7010;--chalk:#e0d8c0;
  --t1:#6b1a1a;--t2:#1a3a6b;--t3:#1a4a30;--t4:#4a4010;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--sand);color:var(--ink);font-family:Georgia,serif;font-size:15px;line-height:1.6}
body{max-width:820px;margin:0 auto}

/* ── HEADER ─────────────────────────────────────── */
.hdr{background:var(--ink);color:#f5f0e4;padding:11px 14px 9px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr h1{font-size:1rem;font-weight:700;line-height:1.25}
.hdr .sub{font-size:.62rem;color:#a09070;margin-top:2px;letter-spacing:.04em}
.tier-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tp{font-family:monospace;font-size:.6rem;padding:2px 7px;border-radius:3px;font-weight:700}
.tp1{background:var(--t1);color:#fff}
.tp2{background:var(--t2);color:#fff}
.tp3{background:var(--t3);color:#fff}
.tp4{background:var(--t4);color:#fff}

/* ── STICKY FILTER BAR ──────────────────────────── */
.filter-bar{position:sticky;top:0;z-index:300;background:var(--sand2);border-bottom:1px solid var(--chalk);padding:7px 10px;display:flex;flex-direction:column;gap:6px;box-shadow:0 2px 6px rgba(0,0,0,.12)}

/* habitat chips — single scrolling row */
.hab-chips{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none}
.hab-chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 11px;border-radius:20px;border:1.5px solid var(--chalk);background:white;font-size:.72rem;font-family:Georgia,serif;color:var(--ink2);cursor:pointer;white-space:nowrap;transition:background .12s,border-color .12s}
.chip:active{opacity:.75}
.chip.active{background:var(--ink);color:#f5f0e4;border-color:var(--ink)}

/* search + bloom row */
.filter-row{display:flex;gap:7px;align-items:center}
.filter-row input{flex:1;padding:6px 10px;border:1px solid var(--chalk);border-radius:8px;font-size:.82rem;background:white;font-family:inherit;outline:none;min-width:0}
.filter-row select{padding:6px 6px;border:1px solid var(--chalk);border-radius:8px;font-size:.78rem;background:white;font-family:inherit;outline:none;cursor:pointer;flex-shrink:0}
.rcount{font-size:.68rem;color:var(--stone);font-family:monospace;white-space:nowrap;flex-shrink:0}

/* ── TIER HEADERS ───────────────────────────────── */
.tier-hdr{padding:8px 14px 6px;border-top:3px solid transparent;background:var(--sand2)}
.tier-hdr.t1{border-color:var(--t1)}.tier-hdr.t2{border-color:var(--t2)}.tier-hdr.t3{border-color:var(--t3)}.tier-hdr.t4{border-color:var(--t4)}
.tier-hdr h2{font-size:.75rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2)}
.tier-hdr p{font-size:.68rem;color:var(--stone);margin-top:1px}

/* ── CARDS ──────────────────────────────────────── */
.card{background:white;border-bottom:2px solid var(--sand2)}
.stripe{height:3px}.s1{background:var(--t1)}.s2{background:var(--t2)}.s3{background:var(--t3)}.s4{background:var(--t4)}
.card-hdr{display:flex;align-items:stretch;cursor:pointer;min-height:80px;-webkit-tap-highlight-color:transparent}
.thumb{width:80px;min-height:80px;flex-shrink:0;background:#d8d0bc;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .noph{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:.57rem;color:var(--stone);text-align:center;padding:5px;line-height:1.3}
.card-meta{flex:1;padding:8px 10px 7px;min-width:0}
.sci{font-style:italic;font-size:.9rem;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:1px}
.com{font-size:.77rem;font-weight:700;color:var(--rust);margin-bottom:4px}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px}
.tag{font-size:.58rem;padding:2px 5px;border-radius:3px;font-weight:700;letter-spacing:.03em;font-family:monospace}
.tg1{background:#f5e8e8;color:var(--t1)}.tg2{background:#e8eef8;color:var(--t2)}
.tg3{background:#e8f4e8;color:var(--t3)}.tg4{background:#f4f0e0;color:var(--t4)}
.tg-hab{background:#f0e8d0;color:var(--stone)}.tg-bl{background:#e0f0e0;color:var(--sage)}.tg-co{background:#e8e0d0;color:#504030}
.row2{font-size:.63rem;color:var(--stone);display:flex;gap:8px;flex-wrap:wrap}
.exp-hint{font-size:.6rem;color:var(--stone);font-family:monospace;margin-top:2px}

/* ── CARD BODY ──────────────────────────────────── */
.card-body{display:none;padding:12px 14px;background:#fdfbf6;border-top:1px solid var(--chalk)}
.card-body.open{display:block}
.pstrip{display:flex;gap:5px;margin-bottom:11px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.pstrip img{width:88px;height:70px;object-fit:cover;border-radius:4px;flex-shrink:0}
.pstrip .pload{width:88px;height:70px;background:var(--sand2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.58rem;color:var(--stone);flex-shrink:0}
.sl{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rust);border-bottom:1px solid var(--chalk);padding-bottom:2px;margin:9px 0 4px}
.sl:first-child{margin-top:0}
.st{font-size:.79rem;line-height:1.6;color:#1a1408}
.kl{list-style:none;padding:0}
.kl li{font-size:.79rem;line-height:1.55;padding:3px 0 3px 13px;position:relative;color:#1a1408}
.kl li::before{content:"▸";position:absolute;left:0;color:var(--rust);font-size:.65rem;top:5px}
.kl li strong{color:var(--sage)}
.abox{background:#fff3e0;border-left:3px solid var(--rust);padding:7px 10px;font-size:.76rem;line-height:1.55;color:#2a1000;margin:5px 0;border-radius:0 4px 4px 0}
.ibox{background:#e8f4fc;border-left:3px solid var(--sky);padding:7px 10px;font-size:.76rem;line-height:1.55;color:#081828;margin:5px 0;border-radius:0 4px 4px 0}
.wbox{background:#fffbe0;border-left:3px solid var(--gold);padding:7px 10px;font-size:.76rem;line-height:1.55;color:#20180a;margin:5px 0;border-radius:0 4px 4px 0}
.inat-lnk{font-size:.7rem;color:var(--sky);text-decoration:none;display:inline-block;margin-top:7px}
.no-res{text-align:center;padding:40px;color:var(--stone);font-size:.88rem}
</style>
</head>

<div id="cards"></div>

let activeHab = '', filtered = [...SP];

function setHab(el, hab){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  activeHab = hab;
  applyFilters();
}

function applyFilters(){
  const q = document.getElementById('search').value.toLowerCase();
  const bl = document.getElementById('bloom-filter').value;
  filtered = SP.filter(sp=>{
    const mH = !activeHab || sp.habitats.includes(activeHab);
    const mQ = !q || [sp.sci,sp.com,sp.code,sp.substrate,...sp.keyChars,sp.where,sp.fieldCues].join(' ').toLowerCase().includes(q);
    const mB = !bl || sp.bloomMonths.includes(bl);
    return mH && mQ && mB;
  });
  buildCards();
}

const TIER = {
  1:{cls:'t1',label:'TIER 1 — Endemic / Globally Rare',desc:'Collect vouchers. GPS + photos mandatory.'},
  2:{cls:'t2',label:'TIER 2 — Very Rare in Oregon',desc:'Document GPS, population count, and photos.'},
  3:{cls:'t3',label:'TIER 3 — Oregon Sensitive S1',desc:'Document all occurrences with GPS and photos.'},
  4:{cls:'t4',label:'TIER 4 — Oregon Sensitive S2',desc:'Record and photograph occurrences.'}
};

function buildCards(){
  const c = document.getElementById('cards');
  document.getElementById('rcount').textContent = filtered.length + ' spp';
  if(!filtered.length){ c.innerHTML='<div class="no-res">No species match your filters.</div>'; return; }
  let lastP = -1, html = '';
  filtered.forEach((sp,i)=>{
    if(sp.priority !== lastP){
      const t = TIER[sp.priority];
      html += `<div class="tier-hdr ${t.cls}"><h2>${t.label}</h2><p>${t.desc}</p></div>`;
      lastP = sp.priority;
    }
    const tc = 'tg'+sp.priority;
    const khtml = sp.keyChars.map(k=>`<li>${k}</li>`).join('');
    const boxCls = sp.priority<=2 ? 'abox' : 'ibox';
    html += `
    <div class="card" id="c${i}">
      <div class="stripe s${sp.priority}"></div>
      <div class="card-hdr" onclick="toggle(${i})">
        <div class="thumb" id="th${i}"><div class="noph">…</div></div>
        <div class="card-meta">
          <div class="sci">${sp.sci}</div>
          <div class="com">${sp.com}</div>
          <div class="tags">
            <span class="tag ${tc}">${sp.globalRank}</span>
            <span class="tag tg-bl">${sp.bloom}</span>
            <span class="tag tg-co">${sp.code}</span>
          </div>
          <div class="row2"><span>↑ ${sp.elev}</span><span>${sp.status}</span></div>
          <div class="exp-hint">▸ expand</div>
        </div>
      </div>
      <div class="card-body" id="b${i}">
        <div class="pstrip" id="ps${i}"><div class="pload">Loading…</div></div>
        <div class="sl">Key field characters</div>
        <ul class="kl">${khtml}</ul>
        <div class="sl">Substrate & habitat</div>
        <p class="st">${sp.substrate_detail}</p>
        <div class="sl">Where to find it</div>
        <p class="st">${sp.where}</p>
        <div class="sl">Habitat cues</div>
        <p class="st">${sp.fieldCues}</p>
        <div class="sl">Survey guidance</div>
        <div class="${boxCls}">${sp.survey}</div>
        <div class="sl">Confusion risk</div>
        <div class="wbox">${sp.confusable}</div>
        <div class="sl">Detection likelihood</div>
        <p class="st" style="font-weight:700">${sp.likelihood}</p>
        <a class="inat-lnk" href="https://www.inaturalist.org/taxa/${sp.inat}" target="_blank">→ iNaturalist</a>
      </div>
    </div>`;
  });
  c.innerHTML = html;
  filtered.forEach((sp,i) => loadPhoto(sp,i));
}

function toggle(i){
  const b = document.getElementById('b'+i);
  const h = document.querySelector('#c'+i+' .exp-hint');
  const wasOpen = b.classList.contains('open');
  document.querySelectorAll('.card-body.open').forEach(x=>x.classList.remove('open'));
  document.querySelectorAll('.exp-hint').forEach(x=>x.textContent='▸ expand');
  if(!wasOpen){
    b.classList.add('open');
    if(h) h.textContent='▾ collapse';
  }
}

function loadPhoto(sp,i){
  fetch(`https://api.inaturalist.org/v1/taxa/${sp.inat}`)
    .then(r=>r.json())
    .then(d=>{
      const t = d.results&&d.results[0];
      if(!t) return;
      const th = document.getElementById('th'+i);
      if(th && t.default_photo&&t.default_photo.medium_url)
        th.innerHTML=`<img src="${t.default_photo.medium_url}" alt="${sp.com}" onerror="this.parentElement.innerHTML='<div class=noph>${sp.sci}</div>'">`;
      const ps = document.getElementById('ps'+i);
      if(ps){
        const photos=(t.taxon_photos||[]).slice(0,4);
        ps.innerHTML = photos.length
          ? photos.map(p=>p.photo&&p.photo.medium_url?`<img src="${p.photo.medium_url}" alt="${sp.com}" onerror="this.style.display=\'none\'">`:'').filter(Boolean).join('')
          : `<a class="inat-lnk" style="padding:8px;display:block" href="https://www.inaturalist.org/taxa/${sp.inat}" target="_blank">View photos on iNaturalist →</a>`;
      }
    })
    .catch(()=>{
      const th=document.getElementById('th'+i);
      if(th) th.innerHTML=`<div class="noph">${sp.sci}</div>`;
    });
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('bloom-filter').addEventListener('change', applyFilters);
buildCards();
</script>
</body>
</html>
